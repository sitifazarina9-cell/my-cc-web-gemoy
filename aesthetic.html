<!DOCTYPE html>
<html>
<head>
    <title>Aesthetic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bg-music" autoplay loop>
  <source src="music/bgmusic.mp3" type="audio/mpeg">
</audio>
<button id="music-btn">⏸️ Pause Music</button>

<a href="gallery.html" class="floating-back">⬅</a>

<h1>Foto Aesthetic 🌷</h1>

<div class="gallery">
    <img src="images/aesthetic1.jpg" alt="Sunset 🌅">
    <img src="images/aesthetic2.jpg" alt="Flowers 🌸">
    <img src="images/aesthetic3.jpg" alt="Beach 🌊">
    <img src="images/aesthetic4.jpg" alt="Coffee ☕">
    <img src="images/aesthetic5.jpg" alt="Books 📚">
</div>

<div id="lightbox" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="lightbox-img">
    <div id="caption"></div>
</div>

<a href="random.html" class="floating-next next-aesthetic">Next ➡</a>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const music = document.getElementById("bg-music");
    const btn = document.getElementById("music-btn");
    btn.onclick = function() {
        if(music.paused){ music.play(); btn.textContent="⏸️ Pause Music"; }
        else{ music.pause(); btn.textContent="▶️ Play Music"; }
    }

    // Lightbox
    const lbModal = document.getElementById("lightbox");
    const lbImg = document.getElementById("lightbox-img");
    const caption = document.getElementById("caption");
    const closeBtn = document.querySelector(".close");

    document.querySelectorAll(".gallery img").forEach(img => {
        img.onclick = function(){
            lbModal.style.display = "block";
            lbImg.src = this.src;
            caption.textContent = this.alt || "Foto Aesthetic 🌷";
        }
    });

    closeBtn.onclick = function() { lbModal.style.display = "none"; }
    lbModal.onclick = function(e){ if(e.target===lbModal) lbModal.style.display="none"; }
});
</script>

</body>
</html>
