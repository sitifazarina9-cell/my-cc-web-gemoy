<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bg-music" autoplay loop>
  <source src="music/bgmusic.mp3" type="audio/mpeg">
</audio>
<button id="music-btn">⏸️ Pause Music</button>

<h1>Gallery 🌈</h1>

<a href="aesthetic.html"><button>Aesthetic</button></a>
<a href="random.html"><button>Random</button></a>
<a href="cutemoment.html"><button>Cute Moment</button></a>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const music = document.getElementById("bg-music");
    const btn = document.getElementById("music-btn");
    btn.onclick = function() {
        if(music.paused){ music.play(); btn.textContent="⏸️ Pause Music"; }
        else{ music.pause(); btn.textContent="▶️ Play Music"; }
    }
});
</script>

</body>
</html>
